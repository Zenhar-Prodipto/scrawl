version: "3.8"

services:
  web:
    build: .
    container_name: drf_scrawl_web
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  db:
    image: postgres:14
    container_name: drf_scrawl_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5434:5432"

  redis:
    image: redis:7.2
    container_name: drf_scrawl_redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    environment:
      - REDIS_URL=${REDIS_URL}

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: drf_scrawl_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: drf_scrawl_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: drf_scrawl_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://drf_scrawl_kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
  redis_data:
