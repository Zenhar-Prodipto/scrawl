version: "3.8"

services:
  # Core Application
  web:
    build:
      context: .
      dockerfile: docker/base/Dockerfile
    volumes:
      - .:/app
    # Port will be set in override files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: ["/app/docker/base/entrypoint.sh"]
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

  # Database
  db:
    image: postgres:14-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    # Port will be set in override files
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    restart: always
    volumes:
      - redis_data:/data
    # Port will be set in override files
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Kafka Infrastructure
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    # Port will be set in override files
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    # Port will be set in override files
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Kafka Topic Initialization
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    command: |
      bash -c "
        kafka-topics --create --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic like.events --if-not-exists
        kafka-topics --create --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic follow.events --if-not-exists  
        kafka-topics --create --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic post.events --if-not-exists
        kafka-topics --create --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic feed_events_dlq --if-not-exists
        echo 'Topics created successfully'
      "

  # Application Consumers

  # General Event Consumer
  consumer:
    build:
      context: .
      dockerfile: docker/base/Dockerfile
    container_name: drf_scrawl_consumer
    volumes:
      - .:/app
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - .env
    entrypoint: ["/app/docker/base/entrypoint.sh"]
    command:
      [
        "python",
        "-u",
        "-m",
        "scrawl.core.messaging.consumers.general_event_consumer",
      ]
    restart: unless-stopped

  # Feed Event Consumer (already updated)
  feed-consumer:
    build:
      context: .
      dockerfile: docker/base/Dockerfile
    container_name: drf_scrawl_feed_consumer
    volumes:
      - .:/app
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: ["/app/docker/base/entrypoint.sh"]
    command:
      [
        "python",
        "-u",
        "-m",
        "scrawl.core.messaging.consumers.feed_event_consumer",
      ]
    restart: unless-stopped

  # Monitoring Stack - Prometheus
  prometheus:
    image: prom/prometheus:latest
    # Port will be set in override files
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"

  # Monitoring Stack - Grafana
  grafana:
    image: grafana/grafana:latest
    # Port will be set in override files
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}

  # ELK Stack - Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    # Port will be set in override files
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  # ELK Stack - Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    # Port will be set in override files
    volumes:
      - ./docker/monitoring/logstash/pipeline:/usr/share/logstash/pipeline
    depends_on:
      - elasticsearch

  # ELK Stack - Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    # Port will be set in override files
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_logs:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
