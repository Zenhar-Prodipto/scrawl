input {
  # Beats input (existing)
  beats {
    port => 5044
  }
  
  # TCP input for Django socket logs (UPDATED)
  tcp {
    port => 5000
    codec => json_lines
    type => "django-elk"
  }
  
  # File input for ELK JSON logs (backup)
  file {
    path => "/app/elk_logs.json"
    start_position => "beginning"
    codec => json_lines
    type => "django-elk-file"
  }
}

filter {
  # Filter for Django ELK logs (NEW)
  if [type] == "django-elk" or [type] == "django-elk-file" {
    # Add environment metadata
    mutate {
      add_field => { 
        "[@metadata][target_index]" => "scrawl-logs-%{+YYYY.MM.dd}"
        "environment" => "${ENVIRONMENT:local}"
        "service_type" => "api"
      }
    }
    
    # Parse duration as float for better analysis
    if [duration] {
      mutate {
        convert => { "duration" => "float" }
      }
    }
    
    # Parse status_code as integer
    if [status_code] {
      mutate {
        convert => { "status_code" => "integer" }
      }
    }
    
    # Add severity based on status code and event type
    if [status_code] {
      if [status_code] >= 500 {
        mutate { add_field => { "severity" => "error" } }
      } else if [status_code] >= 400 {
        mutate { add_field => { "severity" => "warning" } }
      } else if [event_type] == "api_error" {
        mutate { add_field => { "severity" => "error" } }
      } else if [duration] and [duration] > 2.0 {
        mutate { add_field => { "severity" => "warning" } }
      } else {
        mutate { add_field => { "severity" => "info" } }
      }
    }
    
    # Add performance category
    if [duration] {
      if [duration] > 5.0 {
        mutate { add_field => { "performance" => "very_slow" } }
      } else if [duration] > 2.0 {
        mutate { add_field => { "performance" => "slow" } }
      } else if [duration] > 1.0 {
        mutate { add_field => { "performance" => "moderate" } }
      } else {
        mutate { add_field => { "performance" => "fast" } }
      }
    }
    
    # Parse IP for geolocation (optional enhancement)
    if [ip_address] and [ip_address] != "unknown" {
      mutate {
        add_field => { "client_ip" => "%{ip_address}" }
      }
    }
  }
  
  # Filter for legacy Django logs (existing, enhanced)
  if [fields][service] == "django" or [type] == "django-file" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{WORD:level} - %{GREEDYDATA:log_message}" }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
    }
    
    # Add metadata for legacy logs
    mutate {
      add_field => { 
        "[@metadata][target_index]" => "scrawl-legacy-%{+YYYY.MM.dd}"
        "log_type" => "legacy"
      }
    }
  }
}

output {
  # Output for Django ELK logs (NEW)
  if [type] == "django-elk" or [type] == "django-elk-file" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "%{[@metadata][target_index]}"
    }
  }
  
  # Output for legacy logs (existing)
  if [fields][service] == "django" or [type] == "django-file" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "%{[@metadata][target_index]}"
    }
  }
  
  # Debug output to stdout (keep for development)
  stdout {
    codec => rubydebug
    id => "debug_output"
  }
}