global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Django app
  - job_name: "django-app"
    static_configs:
      - targets: ["web:8000"]
    metrics_path: "/api/v1/monitoring/metrics"
    scrape_interval: 30s

  # Redis
  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  # PostgreSQL
  - job_name: "postgres"
    static_configs:
      - targets: ["db:5432"]
